<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
body{
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background:linear-gradient(135deg,#04B5AF,#0A4F7C);
}
.container{
 width:400px;
 background:white;
 padding:40px;
 border-radius:16px;
 box-shadow:0 15px 35px rgba(0,0,0,0.2);
}
h2{text-align:center;margin-bottom:30px;color:#0A4F7C;}
input{
 width:100%;
 padding:12px;
 margin-bottom:15px;
 border:1px solid #ccc;
 border-radius:10px;
}
button{
 width:100%;
 padding:14px;
 border:none;
 border-radius:10px;
 background:linear-gradient(90deg,#04B5AF,#0A4F7C);
 color:white;
 font-weight:bold;
 cursor:pointer;
}
button:hover{
 background:linear-gradient(90deg,#0A4F7C,#04B5AF);
}
.error{
 color:red;
 text-align:center;
 margin-top:10px;
 display:none;
}
.link{text-align:center;margin-top:15px;}
.link a{color:#04B5AF;text-decoration:none;font-weight:bold;}
</style>
</head>

<body>

<div class="container">
<h2>Register</h2>

<input type="email" id="email" placeholder="Email">
<input type="number" id="age" placeholder="Age">
<input type="text" id="position" placeholder="Current Position">
<input type="text" id="industry" placeholder="Industry">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Confirm Password">

<button onclick="register()">Sign Up</button>

<div class="error" id="error"></div>

<div class="link">
<a href="index.html">Back to Login</a>
</div>
</div>

<script>
function register(){
 let e=document.getElementById("email").value;
 let a=document.getElementById("age").value;
 let pos=document.getElementById("position").value;
 let ind=document.getElementById("industry").value;
 let p=document.getElementById("password").value;
 let c=document.getElementById("confirm").value;

 if(e===""||a===""||pos===""||ind===""||p===""||c===""){
  show("Fill all fields");
  return;
 }

 if(p!==c){
  show("Passwords do not match");
  return;
 }

 localStorage.setItem("userEmail",e);
 localStorage.setItem("userAge",a);
 localStorage.setItem("userPosition",pos);
 localStorage.setItem("userIndustry",ind);
 localStorage.setItem("userPassword",p);

 window.location.href="index.html";
}

function show(msg){
 let er=document.getElementById("error");
 er.innerText=msg;
 er.style.display="block";
}
</script>

</body>
</html>
