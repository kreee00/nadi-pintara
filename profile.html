<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
body{display:flex;height:100vh;background:#f4f7f9;}
.sidebar{
    width:200px;
    background:#0A4F7C;
    color:white;
    display:flex;
    flex-direction:column;
    padding-top:40px;
    position:relative; /* for logout at bottom */
}
.sidebar a{
    color:white;
    padding:12px 20px;
    text-decoration:none;
    margin-bottom:5px;
    display:block;
}
.sidebar a:hover, .sidebar a.active{background:#04B5AF;}
.sidebar .logout-btn{
    color:red;
    position:absolute;
    bottom:20px;
    width:100%;
}
.main{flex:1;padding:40px;}
.profile-card{background:white;padding:30px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,0.08);max-width:800px;margin:0 auto;}
.profile-header{display:flex;align-items:center;margin-bottom:30px;}
.profile-header img{width:80px;height:80px;border-radius:50%;margin-right:20px;border:2px solid #04B5AF;}
.profile-header h2{color:#0A4F7C;margin-bottom:5px;}
.profile-header p{color:#04B5AF;font-size:14px;}
.skills{margin-bottom:30px;}
.skill{margin-bottom:15px;}
.skill-label{display:flex;justify-content:space-between;font-weight:bold;font-size:14px;color:#0A4F7C;margin-bottom:5px;}
.skill-bar-container{width:100%;background:#e0e0e0;border-radius:8px;height:12px;overflow:hidden;}
.skill-bar{height:12px;background:#04B5AF;width:0%;border-radius:8px;}
.preferences{margin-bottom:30px;}
.pref-group{margin-bottom:15px;}
.pref-group span{font-weight:bold;margin-right:10px;}
.pref-values{display:flex;gap:10px;margin-top:5px;}
.pref-box{flex:1;text-align:center;padding:8px 0;border-radius:6px;background:#f1f5f9;color:#0A4F7C;}
.pref-box.active{background:#04B5AF;color:white;}
.update-btn{padding:12px 20px;background:red;color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;display:block;margin:0 auto;transition:0.3s;}
.update-btn:hover{background:darkred;}
</style>
</head>
<body>

<div class="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="analysis.html">Interest Analysis</a>
    <a href="profile.html" class="active">Profile</a>
    <a href="#" class="logout-btn" onclick="logout()">Logout</a>
</div>

<div class="main">
<div class="profile-card">
    <div class="profile-header">
        <img src="C:\Users\User\Pictures\download (10).png" alt="Profile Picture">
        <div>
            <h2>Bruce Wayne</h2>
            <p>Bruce_wayne43@utp.edu.my</p>
            <p style="font-size:12px;color:#999;">Current Role: Data Analyst</p>
        </div>
    </div>

    <div class="skills">
        <h3>Skill Levels</h3>
        <div class="skill">
            <div class="skill-label"><span>Communication</span><span>6/10</span></div>
            <div class="skill-bar-container"><div class="skill-bar" style="width:60%;"></div></div>
        </div>
        <div class="skill">
            <div class="skill-label"><span>Data Analysis</span><span>7/10</span></div>
            <div class="skill-bar-container"><div class="skill-bar" style="width:70%;"></div></div>
        </div>
        <div class="skill">
            <div class="skill-label"><span>Excel</span><span>8/10</span></div>
            <div class="skill-bar-container"><div class="skill-bar" style="width:80%;"></div></div>
        </div>
    </div>

    <div class="preferences">
        <h3>Preferences</h3>
        <div class="pref-group">
            <span>Learning Pace:</span>
            <div class="pref-values">
                <div class="pref-box">Slow</div>
                <div class="pref-box active">Moderate</div>
                <div class="pref-box">Faster</div>
            </div>
        </div>
        <div class="pref-group">
            <span>Learning Format:</span>
            <div class="pref-values">
                <div class="pref-box">Video</div>
                <div class="pref-box active">Reading</div>
                <div class="pref-box">Mixed</div>
            </div>
        </div>
    </div>

    <button class="update-btn">Update Profile</button>
</div>
</div>

<script>
function logout(){
    localStorage.removeItem("loggedInUser");
    window.location.href="index.html";
}

// Optional: show logged in user name/email
let user = localStorage.getItem("loggedInUser");
if(user){
    document.querySelector(".profile-header h2").innerText = user;
    document.querySelector(".profile-header p").innerText = user;
}
</script>

</body>
</html>
