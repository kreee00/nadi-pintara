<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#04B5AF,#0A4F7C);
}
.container{
width:380px;
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}
h2{text-align:center;margin-bottom:30px;color:#0A4F7C;}
input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
}
button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#04B5AF;
color:white;
font-weight:bold;
cursor:pointer;
}
button:hover{background:#0A4F7C;}
.link{
text-align:center;
margin-top:15px;
}
.link a{
color:#04B5AF;
text-decoration:none;
font-weight:bold;
}
.error{
color:red;
text-align:center;
margin-top:10px;
display:none;
}
</style>
</head>
<body>

<div class="container">
<h2>LOGIN</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="error" id="error">Please enter username & password</div>

<div class="link">
<a href="register.html">Create Account</a>
</div>
</div>

<script>
function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u!=="" && p!==""){
localStorage.setItem("loggedInUser",u);
window.location.href="dashboard.html";
}else{
document.getElementById("error").style.display="block";
}
}
</script>

</body>
</html>
